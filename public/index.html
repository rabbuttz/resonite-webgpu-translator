<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Resonite Translator (JP&lt;-&gt;EN)</title>
<link rel="stylesheet" href="./style.css" />
</head>
<body>
<main>
  <h1>Resonite Translator</h1>
  <p class="sub"><span data-i18n="subtitle">Web Speech API + LFM2-350M-ENJP-MT (WebGPU)</span> — <a href="./viewer.html" data-i18n="viewerLink">受信テストページ →</a></p>

  <section class="controls">
    <label><span data-i18n="targetUserLabel">送信先 Resonite ユーザー名</span>
      <input id="target-user" list="user-list" placeholder="例: alice" data-i18n-placeholder="targetUserPlaceholder" autocomplete="off" />
      <datalist id="user-list"></datalist>
    </label>

    <fieldset>
      <legend data-i18n="directionLegend">翻訳方向</legend>
      <label><input type="radio" name="dir" value="ja2en" checked /> JA → EN</label>
      <label><input type="radio" name="dir" value="en2ja" /> EN → JA</label>
    </fieldset>

    <label>
      <input type="checkbox" id="live-mode" />
      <span data-i18n="liveModeLabel">リアルタイム翻訳テスト機能 (interim も逐次翻訳して送る)</span>
    </label>

    <div class="buttons">
      <button id="start" disabled>Start</button>
      <button id="stop" disabled>Stop</button>
      <button id="refresh-users" type="button" data-i18n="refreshUsers">接続中ユーザー再取得</button>
    </div>
  </section>

  <section class="status">
    <div><span data-i18n="relayLabel">中継</span>: <span id="relay-status">-</span></div>
    <div><span data-i18n="modelLabel">モデル</span>: <span id="model-status" data-i18n="modelInitial">未ロード</span></div>
    <div><span data-i18n="recognitionLabel">認識</span>: <span id="rec-status" data-i18n="recStopped">停止</span></div>
    <div><span data-i18n="publishLabel">最終配信</span>: <span id="publish-status">-</span></div>
  </section>

  <section class="log">
    <h2 data-i18n="liveTitle">ライブ</h2>
    <div class="row">
      <div class="label" data-i18n="interimLabel">途中 (interim)</div>
      <div id="interim" class="value muted"></div>
    </div>
    <div class="row">
      <div class="label" data-i18n="originalLabel">原文</div>
      <div id="original" class="value"></div>
    </div>
    <div class="row">
      <div class="label" data-i18n="translatedLabel">訳文</div>
      <div id="translated" class="value"></div>
    </div>

    <h2 data-i18n="historyTitle">履歴</h2>
    <ol id="history"></ol>
  </section>
</main>
<script type="module" src="./main.js"></script>
</body>
</html>
