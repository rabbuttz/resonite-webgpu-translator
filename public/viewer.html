<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Resonite Translator — Viewer (test)</title>
<link rel="stylesheet" href="./style.css" />
</head>
<body>
<main>
  <h1>Viewer (Resonite側の代わり)</h1>
  <p class="sub">指定ユーザー名の WebSocket チャンネルを購読して、受信メッセージを表示します。</p>

  <section class="controls">
    <label>受信するユーザー名
      <input id="user" placeholder="例: alice" autocomplete="off" />
    </label>
    <div class="buttons">
      <button id="connect">Connect</button>
      <button id="disconnect" disabled>Disconnect</button>
      <button id="clear" type="button">クリア</button>
    </div>
  </section>

  <section class="status">
    <div>接続: <span id="conn">未接続</span></div>
    <div>受信件数: <span id="count">0</span></div>
  </section>

  <section class="log">
    <h2>受信ログ</h2>
    <div class="row">
      <div class="label">最新 訳文</div>
      <div id="latest" class="value"></div>
    </div>
    <ol id="history"></ol>
  </section>

  <p class="sub"><a href="./">← 認識・送信ページへ</a></p>
</main>
<script type="module" src="./viewer.js"></script>
</body>
</html>
